name: Validate

on:
  push:
    paths:
      - "README.md"
      - "modules/**"
      - "activities/**"
      - "scripts/**"
      - "pages/**"
      - "assets/**"
      - "mind-map.json"
      - "mind-map.md"
      - "requirements.txt"
      - ".github/workflows/validate.yml"
  pull_request:
    paths:
      - "README.md"
      - "modules/**"
      - "activities/**"
      - "scripts/**"
      - "pages/**"
      - "assets/**"
      - "requirements.txt"
      - ".github/workflows/validate.yml"

jobs:
  reproducibility:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Check mind-map views are generated from source
        run: python scripts/build_mindmap.py --check

      - name: Install dependencies
        run: python -m pip install --upgrade pip && python -m pip install -r requirements.txt

      - name: Regenerate activity results
        run: python activities/atividade-1.py

      - name: Validate reported anchors
        run: python scripts/validate_activity_results.py
